<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Reading Primer — Grades 9–12</title>
    <link rel="stylesheet" href="style.css">
    <style>
        /* Strategies-viewer-specific styles (build on style.css) */
        .course-banner {
            background: var(--color-primary-light);
            border: 1px solid var(--color-primary);
            border-radius: 8px;
            padding: 16px 20px;
            margin-bottom: 24px;
        }
        .course-banner h2 { font-size: 1.3rem; margin-bottom: 4px; }
        .course-banner .course-sequence {
            font-size: 0.8rem;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 0.04em;
            color: var(--color-primary);
            margin-bottom: 8px;
        }
        .course-banner .course-desc { font-size: 0.92rem; margin-bottom: 8px; }
        .course-banner .course-paired {
            font-size: 0.82rem;
            color: var(--color-text-muted);
            font-style: italic;
        }
        .course-banner .course-stats {
            display: flex;
            gap: 16px;
            flex-wrap: wrap;
            margin-top: 10px;
            font-size: 0.8rem;
        }
        .course-banner .course-stats span {
            background: var(--color-surface);
            padding: 2px 10px;
            border-radius: 4px;
        }

        .lesson-objective {
            background: var(--color-feedback-bg);
            border-left: 3px solid var(--color-primary);
            padding: 10px 14px;
            border-radius: 4px;
            margin-bottom: 18px;
            font-size: 0.95rem;
        }
        .lesson-objective .label {
            font-size: 0.72rem;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 0.05em;
            color: var(--color-primary);
            display: block;
            margin-bottom: 3px;
        }

        .concepts-list { list-style: none; margin-bottom: 20px; }
        .concepts-list li {
            position: relative;
            padding: 6px 0 6px 26px;
            font-size: 0.95rem;
            border-bottom: 1px solid var(--color-border);
        }
        .concepts-list li:last-child { border-bottom: none; }
        .concepts-list li::before {
            content: '';
            position: absolute;
            left: 6px;
            top: 13px;
            width: 8px;
            height: 8px;
            background: var(--color-primary);
            border-radius: 50%;
        }

        .instruction-text {
            font-size: 1.02rem;
            line-height: 1.8;
            margin-bottom: 20px;
        }

        .connection-box {
            background: var(--color-bg);
            border-radius: 8px;
            padding: 14px 16px;
            margin-bottom: 20px;
            font-size: 0.9rem;
        }
        .connection-box .label {
            font-size: 0.72rem;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 0.05em;
            color: var(--color-text-muted);
            display: block;
            margin-bottom: 4px;
        }

        .cfu-card {
            border: 1px solid var(--color-border);
            border-radius: 8px;
            padding: 18px 20px;
            margin-top: 8px;
        }
        .cfu-card .cfu-label {
            font-size: 0.72rem;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 0.05em;
            color: var(--color-primary);
            margin-bottom: 8px;
        }
        .cfu-prompt { font-weight: 500; margin-bottom: 12px; }
        .cfu-choices { list-style: none; }
        .cfu-choice {
            display: flex;
            align-items: flex-start;
            gap: 10px;
            padding: 9px 12px;
            margin-bottom: 6px;
            border: 1px solid var(--color-border);
            border-radius: 6px;
            cursor: pointer;
            font-size: 0.95rem;
            transition: background 0.12s, border-color 0.12s;
        }
        .cfu-choice:hover { background: var(--color-bg); }
        .cfu-choice .cfu-letter {
            font-weight: 600;
            min-width: 24px;
            height: 24px;
            display: flex;
            align-items: center;
            justify-content: center;
            border-radius: 50%;
            font-size: 0.8rem;
            background: var(--color-bg);
            flex-shrink: 0;
        }
        .cfu-choices.revealed .cfu-choice { cursor: default; }
        .cfu-choices.revealed .cfu-choice.correct {
            background: var(--color-correct-bg);
            border-color: var(--color-correct);
        }
        .cfu-choices.revealed .cfu-choice.correct .cfu-letter {
            background: var(--color-correct);
            color: white;
        }
        .cfu-choice.chosen-wrong {
            background: var(--color-incorrect-bg);
            border-color: #dc2626;
        }
        .cfu-feedback {
            margin-top: 10px;
            font-size: 0.88rem;
            color: var(--color-text-muted);
            display: none;
        }
        .cfu-feedback.show { display: block; }

        /* Video player */
        .video-stage {
            position: relative;
            background: #0f172a;
            color: #f8fafc;
            border-radius: 10px;
            min-height: 200px;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 32px 28px;
            overflow: hidden;
        }
        .video-subtitle {
            font-size: 1.15rem;
            line-height: 1.7;
            text-align: center;
            max-width: 640px;
            transition: opacity 0.2s;
        }
        .video-badge {
            position: absolute;
            top: 12px;
            left: 14px;
            font-size: 0.68rem;
            text-transform: uppercase;
            letter-spacing: 0.08em;
            color: #94a3b8;
        }
        .video-overlay {
            position: absolute;
            inset: 0;
            background: rgba(15, 23, 42, 0.97);
            display: none;
            flex-direction: column;
            justify-content: center;
            padding: 24px 28px;
            overflow-y: auto;
        }
        .video-overlay.show { display: flex; }
        .video-overlay .checkpoint-tag {
            font-size: 0.72rem;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 0.06em;
            color: #fbbf24;
            margin-bottom: 8px;
        }
        .video-overlay .cfu-prompt { color: #f8fafc; }
        .video-overlay .cfu-choice {
            background: rgba(255,255,255,0.06);
            border-color: rgba(255,255,255,0.18);
            color: #f1f5f9;
        }
        .video-overlay .cfu-choice .cfu-letter { background: rgba(255,255,255,0.15); color: #f1f5f9; }
        .video-overlay .cfu-feedback { color: #cbd5e1; }
        .continue-btn {
            margin-top: 12px;
            align-self: flex-start;
            padding: 8px 18px;
            background: var(--color-primary);
            color: #fff;
            border: none;
            border-radius: 6px;
            cursor: pointer;
            font-size: 0.85rem;
            font-weight: 600;
            display: none;
        }
        .continue-btn.show { display: inline-block; }

        .video-controls {
            display: flex;
            align-items: center;
            gap: 12px;
            margin-top: 10px;
        }
        .play-btn {
            width: 40px;
            height: 40px;
            border-radius: 50%;
            border: none;
            background: var(--color-primary);
            color: #fff;
            font-size: 1rem;
            cursor: pointer;
            flex-shrink: 0;
        }
        .play-btn:hover { filter: brightness(1.08); }
        .video-time {
            font-size: 0.78rem;
            color: var(--color-text-muted);
            font-variant-numeric: tabular-nums;
            flex-shrink: 0;
            min-width: 72px;
        }
        .video-progress {
            position: relative;
            flex: 1;
            height: 8px;
            background: var(--color-border);
            border-radius: 4px;
            cursor: pointer;
        }
        .video-progress-fill {
            position: absolute;
            left: 0; top: 0; bottom: 0;
            background: var(--color-primary);
            border-radius: 4px;
            width: 0%;
        }
        .placemarker {
            position: absolute;
            top: -3px;
            width: 14px;
            height: 14px;
            margin-left: -7px;
            background: #fbbf24;
            border: 2px solid var(--color-surface);
            border-radius: 50%;
            cursor: pointer;
            transition: transform 0.1s;
        }
        .placemarker:hover { transform: scale(1.25); }
        .placemarker.answered { background: var(--color-correct); }

        .transcript-list {
            margin-top: 16px;
            border: 1px solid var(--color-border);
            border-radius: 8px;
            max-height: 280px;
            overflow-y: auto;
        }
        .transcript-line {
            display: flex;
            gap: 12px;
            padding: 8px 14px;
            font-size: 0.92rem;
            line-height: 1.6;
            cursor: pointer;
            border-bottom: 1px solid var(--color-border);
        }
        .transcript-line:last-child { border-bottom: none; }
        .transcript-line:hover { background: var(--color-bg); }
        .transcript-line.active { background: var(--color-primary-light); }
        .transcript-line .ts {
            color: var(--color-primary);
            font-variant-numeric: tabular-nums;
            font-size: 0.8rem;
            flex-shrink: 0;
            min-width: 38px;
        }
        .transcript-marker {
            display: flex;
            align-items: center;
            gap: 8px;
            padding: 6px 14px;
            font-size: 0.8rem;
            font-weight: 600;
            color: #b45309;
            background: #fffbeb;
            border-bottom: 1px solid var(--color-border);
            cursor: pointer;
        }
        .transcript-marker::before { content: '❓'; }

        .quiz-q-meta {
            font-size: 0.75rem;
            color: var(--color-text-muted);
            margin-bottom: 14px;
        }

        .ccss-tags { display: flex; gap: 6px; flex-wrap: wrap; }
        .ccss-tag {
            background: var(--color-bg);
            padding: 2px 8px;
            border-radius: 4px;
            font-size: 0.72rem;
            font-family: ui-monospace, SFMono-Regular, Menlo, monospace;
            color: var(--color-text-muted);
        }
        .lesson-nav {
            display: flex;
            justify-content: space-between;
            gap: 12px;
            margin-top: 28px;
            padding-top: 18px;
            border-top: 1px solid var(--color-border);
        }
        .lesson-nav button {
            padding: 8px 16px;
            border: 1px solid var(--color-border);
            border-radius: 6px;
            background: var(--color-surface);
            cursor: pointer;
            font-size: 0.85rem;
            font-weight: 500;
        }
        .lesson-nav button:hover:not(:disabled) {
            background: var(--color-primary-light);
            border-color: var(--color-primary);
        }
        .lesson-nav button:disabled { opacity: 0.4; cursor: default; }

        .module-group-header {
            padding: 12px 12px 4px;
            font-size: 0.72rem;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 0.04em;
            color: var(--color-text-muted);
            margin-top: 10px;
            line-height: 1.4;
        }
        .module-group-header:first-child { margin-top: 0; }
        .module-group-header .module-meta {
            display: block;
            font-weight: 500;
            text-transform: none;
            letter-spacing: 0;
            font-size: 0.7rem;
            margin-top: 2px;
        }
        .lesson-item .lesson-item-meta {
            font-size: 0.72rem;
            color: var(--color-text-muted);
            margin-top: 2px;
        }
        .header-nav-link {
            font-size: 0.82rem;
            color: var(--color-primary);
            text-decoration: none;
            padding: 6px 12px;
            border: 1px solid var(--color-border);
            border-radius: 6px;
            white-space: nowrap;
        }
        .header-nav-link:hover { background: var(--color-primary-light); }
    
 .hubnav{display:flex;flex-wrap:wrap;gap:8px;align-items:center}
 .grade-tabs{margin:0 auto}
 .hubnav a{margin-left:0;color:#2563eb;text-decoration:none;font-weight:600;font-size:13px;background:#dbeafe;padding:5px 12px;border-radius:6px;border:1px solid #cfe0fd}
 .hubnav a:hover{background:#c7dbfd;text-decoration:none}
</style>
</head>
<body>
    <header class="header">
        <div class="header-left">
            <h1 class="header-title">Reading Primer</h1>
            <span class="header-date">Reading Strategy Courses · Grades 9–12</span>
        </div>
        <nav class="grade-tabs" id="gradeTabs"></nav>
        <nav class="hubnav"><a href="primer-overview.html">Lesson Overview &rarr;</a><a href="primer-quality-grid.html">Quality Grid &rarr;</a><a href="hfing-overview.html">HFing Overview &rarr;</a></nav>
    </header>

    <main class="layout">
        <aside class="sidebar" id="sidebar">
            <div class="sidebar-header">
                <input type="text" class="search-input" id="searchInput" placeholder="Search lessons...">
            </div>
            <div class="article-list" id="lessonList">
                <p class="placeholder-text">Select a grade to browse lessons.</p>
            </div>
        </aside>

        <section class="content" id="content">
            <div class="placeholder-text" id="contentPlaceholder">
                <h2>Reading Strategy Courses</h2>
                <p>Select a grade level above, then choose a lesson from the sidebar. Each course precedes that grade's Alpha Read articles.</p>
            </div>
            <article class="article-view" id="lessonView" style="display:none"></article>
        </section>
    </main>

    <script src="strategies.js"></script>
</body>
</html>
